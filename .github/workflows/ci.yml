name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install

    - name: Type check
      run: yarn typecheck

    - name: Lint code
      run: yarn lint

    - name: Run unit tests
      run: yarn test:unit

    - name: Run Nuxt component tests
      run: yarn test:nuxt

    - name: Run all tests with coverage
      run: yarn test:coverage

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.node-version == '20.x'
      with:
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install

    - name: Build application
      run: yarn build

    - name: Build library component (when config exists)
      run: |
        if [ -f "build/component.vite.config.ts" ]; then
          npx vite build -c build/component.vite.config.ts
        else
          echo "Library build config not found, skipping"
        fi
      continue-on-error: true